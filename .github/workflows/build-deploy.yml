name: Build & Deploy

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**']
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build, Push & Update Manifests
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push api
        uses: docker/build-push-action@v5
        id: build-api
        with:
          context: apps/api
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/madfam-org/nuit-one/api:${{ github.sha }}
            ghcr.io/madfam-org/nuit-one/api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push web
        uses: docker/build-push-action@v5
        id: build-web
        with:
          context: apps/web
          file: apps/web/Dockerfile
          push: true
          tags: |
            ghcr.io/madfam-org/nuit-one/web:${{ github.sha }}
            ghcr.io/madfam-org/nuit-one/web:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2


      - name: Update api image digest
        working-directory: infra/k8s/production
        run: |
          kustomize edit set image ghcr.io/madfam-org/nuit-one/api=ghcr.io/madfam-org/nuit-one/api@${{ steps.build-api.outputs.digest }}

      - name: Update web image digest
        working-directory: infra/k8s/production
        run: |
          kustomize edit set image ghcr.io/madfam-org/nuit-one/web=ghcr.io/madfam-org/nuit-one/web@${{ steps.build-web.outputs.digest }}

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/production/kustomization.yaml
          git diff --staged --quiet || git commit -m "ci: update image digests [skip ci]"
          git push
