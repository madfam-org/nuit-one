apiVersion: apps/v1
kind: Deployment
metadata:
  name: nuit-one-web
  namespace: nuit-one
  labels:
    app: nuit-one-web
    app.kubernetes.io/name: nuit-one-web
    app.kubernetes.io/part-of: nuit-one
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nuit-one-web
  template:
    metadata:
      labels:
        app: nuit-one-web
        app.kubernetes.io/name: nuit-one-web
        app.kubernetes.io/part-of: nuit-one
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
      - name: ghcr-credentials
      containers:
      - name: nuit-one-web
        image: ghcr.io/madfam-org/nuit-one/web:latest
        ports:
        - containerPort: 3000
          name: http
        envFrom:
        - secretRef:
            name: nuit-one-secrets
            optional: true
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        startupProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 30
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          periodSeconds: 30
